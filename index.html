<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Predictor | Premium Edition</title>
    <meta name="description" content="A stylish number prediction game with modern glassmorphism UI.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="glass-card" id="gameCard">
            <header>
                <h1>Number Predictor</h1>
                <p class="subtitle">Guess the number between 1 and 100</p>
            </header>

            <main class="game-content">
                <div class="input-group">
                    <input type="number" id="guessInput" placeholder="Enter your guess" min="1" max="100">
                </div>
                
                <button id="predictBtn">Predict Now</button>
                <button id="resetBtn" class="hidden">Play Again</button>

                <div id="feedback" class="feedback"></div>

                <div class="stats">
                    <div class="stat-item">
                        <span>Attempts</span>
                        <p id="attemptCount">0</p>
                    </div>
                    <div class="stat-item">
                        <span>Best Score</span>
                        <p id="bestScore">-</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
